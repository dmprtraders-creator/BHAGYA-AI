<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting App - Welcome!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
        }

        input:focus {
            border-color: #764ba2;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #999;
        }

        .greeting-message {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting-message.show {
            display: block;
        }

        .greeting-message.meera {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3);
        }

        .greeting-message.pawan {
            background: linear-gradient(135deg, #ffa500 0%, #ff6347 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255, 165, 0, 0.3);
        }

        .greeting-message p {
            margin-bottom: 10px;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0% {
                transform: translateY(-30px);
                opacity: 0;
            }
            50% {
                transform: translateY(10px);
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hint {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            font-style: italic;
        }

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .firework {
            position: fixed;
            pointer-events: none;
        }

        .particle {
            position: fixed;
            pointer-events: none;
        }

        /* Confetti styles */
        .confetti {
            position: fixed;
            pointer-events: none;
            width: 10px;
            height: 10px;
        }

        .confetti-piece {
            display: inline-block;
        }

        #animalContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }

        #superheroContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }

        .animal-emoji {
            position: fixed;
            font-size: 60px;
            animation: animal-bounce 1s ease-in-out infinite;
        }

        @keyframes animal-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .superhero-text {
            position: fixed;
            font-size: 48px;
            font-weight: bold;
            font-style: italic;
            text-shadow: 3px 3px 0 #ff0000, 6px 6px 0 #ffff00;
            animation: hero-zoom 0.6s ease-out;
        }

        @keyframes hero-zoom {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }

            position: fixed;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: rhyme-float 3s ease-out forwards;
        }

            0% { 
                transform: translateY(0) translateX(0); 
                opacity: 1;
            }
            100% {

        // Enhanced sound effect function with better quality
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'fireworks') {
                    // Fireworks sound - burst effect with multiple frequencies
                    const now = audioContext.currentTime;
                    for (let i = 0; i < 5; i++) {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(300 + i * 150, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                        
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        
                        osc.start(now + i * 0.08);
                        osc.stop(now + 0.15 + i * 0.08);
                    }
                } else if (type === 'confetti') {
                    // Confetti sound - cheerful chiming sequence
                    const notes = [800, 1000, 1200, 1400];
                    notes.forEach((freq, idx) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, audioContext.currentTime + idx * 0.1);
                        gain.gain.setValueAtTime(0.25, audioContext.currentTime + idx * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + idx * 0.1 + 0.2);
                        
                        osc.start(audioContext.currentTime + idx * 0.1);
                        osc.stop(audioContext.currentTime + idx * 0.1 + 0.2);
                    });
                }
            } catch (e) {
                console.log('Audio context not available');
            }
        }

        // Animal animation for Prashiv (younger son)
        function createAnimalAnimation() {

                    animal.style.left = x + 'px';
                    animal.style.top = y + 'px';

        // Elder son celebration for Daivik
        function createDaikvikCelebration() {
            playSound('fireworks');
            playRelationshipMusic('pawan');
            
            // Multiple celebration particles
            const celebrations = Array(80).fill().map(() => ({
                emoji: ['🌟', '✨', '💎', '👑', '🏆', '⭐', '🎖️', '🥇'][Math.floor(Math.random() * 8)],
            }));
            
            celebrations.forEach((item, idx) => {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    const x = Math.random() * window.innerWidth;
                    const y = window.innerHeight;
                    
                    particle.style.position = 'fixed';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.fontSize = '40px';
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '9998';
                    particle.textContent = item.emoji;
                    
                    let posY = y;
                    let alpha = 1;
                    const velocity = 2 + Math.random() * 3;
                    
                    const animate = () => {
                        posY -= velocity;
                        alpha -= 0.01;
                        
                        particle.style.top = posY + 'px';
                        particle.style.opacity = alpha;
                        
                        if (alpha > 0 && posY > 0) {
                            requestAnimationFrame(animate);
                        } else {
                            particle.remove();
                        }
                    };
                    
                    document.body.appendChild(particle);
                    animate();
                }, idx * 30);
            });
        }

        // Fireworks function
        function createFireworks() {
            playSound('fireworks');
            playRelationshipMusic('pawan');  // Play father's theme music
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    
                    const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff1493'];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    let particlesCount = 25 + Math.random() * 25;
                    
                    for (let j = 0; j < particlesCount; j++) {
                        const particle = document.createElement('div');
                        particle.classList.add('particle');
                        
                        const size = 3 + Math.random() * 5;
                        particle.style.width = size + 'px';
                        particle.style.height = size + 'px';
                        particle.style.backgroundColor = color;
                        particle.style.borderRadius = '50%';
                        particle.style.left = x + 'px';
                        particle.style.top = y + 'px';
                        particle.style.boxShadow = `0 0 ${size * 3}px ${color}`;
                        
                        const angle = (j / particlesCount) * Math.PI * 2;
                        const velocity = 5 + Math.random() * 8;
                        const vx = Math.cos(angle) * velocity;
                        const vy = Math.sin(angle) * velocity;
                        
                        let posX = x;
                        let posY = y;
                        let velX = vx;
                        let velY = vy;
                        let alpha = 1;
                        
                        const animate = () => {
                            posX += velX;
                            posY += velY;
                            velY += 0.15;
                            alpha -= 0.012;
                            
                            particle.style.left = posX + 'px';
                            particle.style.top = posY + 'px';
                            particle.style.opacity = alpha;
                            
                            if (alpha > 0) {
                                requestAnimationFrame(animate);
                            } else {
                                particle.remove();
                            }
                        };
                        
                        fireworksContainer.appendChild(particle);
                        animate();
                    }
                }, i * 40);
            }
        }

        // Confetti function
        function createConfetti() {
            playSound('confetti');
            playRelationshipMusic('meera');  // Play wife's theme music
            const confettiPieces = 100;
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE'];
            
            for (let i = 0; i < confettiPieces; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                const size = 8 + Math.random() * 8;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const x = Math.random() * window.innerWidth;
                const y = -10;
                const rotation = Math.random() * 360;
                const velocity = 3 + Math.random() * 5;
                const horizontalVelocity = (Math.random() - 0.5) * 4;
                
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                confetti.style.backgroundColor = color;
                confetti.style.borderRadius = '50%';
                confetti.style.opacity = '1';
                
                let posX = x;
                let posY = y;
                let velY = velocity;
                let velX = horizontalVelocity;
                let rot = rotation;
                let alpha = 1;
                
                const animate = () => {
                    posY += velY;
                    posX += velX;
                    velY += 0.08;
                    rot += 5;
                    alpha -= 0.008;
                    
                    confetti.style.left = posX + 'px';
                    confetti.style.top = posY + 'px';
                    confetti.style.transform = `rotate(${rot}deg)`;
                    confetti.style.opacity = alpha;
                    
                    if (posY < window.innerHeight && alpha > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        confetti.remove();
                    }
                };
                
                confettiContainer.appendChild(confetti);
                animate();
            }
        }
